AWSTemplateFormatVersion: 2010-09-09
Transform: AWS::Serverless-2016-10-31
Description: SAM boilerplate with CORS handled 100% by API Gateway HTTP API

Resources:
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.14
      Handler: app.lambda_handler
      CodeUri: backend/
      MemorySize: 128
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: ANY
            Path: /api
            #
            # WARNING: Do NOT change this to /{proxy+}.
            #
            # A catch-all route /{proxy+} forwards EVERY request to Lambda,
            # including typos and wrong paths. This means:
            #   1. API Gateway can never return a 404 for unknown routes
            #   2. Lambda must handle routing logic itself
            #   3. You lose the ability to test API Gateway error responses (404, 405)
            #
            # If you need multiple endpoints, define them explicitly as separate
            # HttpApi events, or use a custom domain + stage mapping.
            #
            # Path: /{proxy+}

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: Prod
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
        MaxAge: 86400

Outputs:
  HttpApiUrl:
    Description: HTTP API endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/api'
